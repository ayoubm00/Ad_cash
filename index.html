<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADCash - Earn</title>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #0088cc; color: white; padding-top: 50px; }
        .btn { background-color: white; color: #0088cc; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>مرحباً بك في ADCash</h1>
    <p>شاهد الإعلان للحصول على مكافأة</p>
    
    <button class="btn" onclick="showAd()">📺 مشاهدة الإعلان</button>

    <script>
        // تأكد من تغيير الرقم أدناه إلى رقم الـ ID الجديد الخاص بك
        const MY_BLOCK_ID = "23028"; 

        function showAd() {
            // التحقق من تحميل المكتبة
            if (!window.Adsgram) {
                alert("خطأ: محرك الإعلانات لم يتم تحميله بعد. تأكد من اتصال الإنترنت.");
                return;
            }

            const AdController = window.Adsgram.init({ blockId: MY_BLOCK_ID });

            AdController.show().then((result) => {
                // إذا اكتمل الإعلان بنجاح
                if (result.done) {
                    alert("تمت المشاهدة! جاري إرسال المكافأة...");
                    saveRewardToDatabase();
                }
            }).catch((result) => {
                // إظهار سبب الخطأ (مثل In Moderation)
                alert("Adsgram Status: " + result.description);
                console.log("Error details:", result);
            });
        }

        function saveRewardToDatabase() {
            const tg = window.Telegram.WebApp;
            const userId = tg.initDataUnsafe?.user?.id;

            if (!userId) {
                alert("خطأ: لم نتمكن من العثور على User ID الخاص بك.");
                return;
            }

            // إرسال الطلب للسيرفر الخاص بك على Render
            fetch(`https://botserv.onrender.com/ad-reward?user_id=${userId}`)
                .then(response => {
                    if (response.ok) alert("مبروك! تم إضافة الرصيد بنجاح.");
                    else alert("حدث خطأ في السيرفر أثناء إضافة الرصيد.");
                })
                .catch(err => alert("خطأ في الاتصال بالسيرفر: " + err));
        }
    </script>
</body>
</html>
