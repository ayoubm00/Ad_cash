<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADCash - Watch & Earn</title>
      <script src='//libtl.com/sdk.js' data-zone='10673309' data-sdk='show_10673309'></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #fff; user-select: none; }
        .nav-item.active { color: #6366f1; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .disabled-card { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    </style>

</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="flex justify-between items-center p-4 bg-slate-800/80 backdrop-blur border-b border-slate-700">
        <div class="flex items-center">
            <div class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center mr-3 shadow-lg">
                <i class="fas fa-coins text-white"></i>
            </div>
            <div>
                <p class="text-[10px] text-slate-400 uppercase">الرصيد الحالي</p>
                <p class="font-bold text-white leading-none text-xl" id="balance">0.000</p>
            </div>
        </div>
        <div class="text-indigo-400 font-bold text-lg">ADCash</div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24">
        
        <div id="home-page" class="page-section active">
            <div id="ad-card" onclick="startAdCycle()" class="bg-gradient-to-r from-purple-600 to-blue-600 rounded-2xl p-6 mb-6 relative overflow-hidden shadow-lg active:scale-95 transition cursor-pointer">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold text-white mb-1"><i class="fas fa-play-circle ml-2"></i>شاهد واربح</h2>
                    <p class="text-blue-100 text-sm">شاهد 3 إعلانات للحصول على المكافأة!</p>
                    <div class="mt-4 inline-block bg-white/20 px-4 py-1 rounded-full text-xs font-bold backdrop-blur-sm">
                        المكافأة: 0.005 USDT
                    </div>
                </div>
                <i class="fas fa-video absolute -bottom-4 -left-4 text-8xl text-white opacity-10"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="text-slate-400 text-xs">إجمالي المهام</p>
                    <p class="text-xl font-bold text-green-400" id="total-tasks">0</p>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="text-slate-400 text-xs">الإحالات</p>
                    <p class="text-xl font-bold text-blue-400" id="total-refs">0</p>
                </div>
            </div>
        </div>

        <div id="wallet-page" class="page-section">
            <div class="bg-slate-800 rounded-2xl p-6 mb-6 text-center border border-slate-700">
                <p class="text-slate-400 text-sm mb-1">قابل للسحب</p>
                <h1 class="text-4xl font-bold text-yellow-400 mb-2" id="wallet-balance-display">0.000</h1>
                <p class="text-xs text-green-400 font-bold bg-green-400/10 inline-block px-3 py-1 rounded-full">الحد الأدنى: 5 USDT</p>
            </div>
            <div class="bg-slate-800 rounded-xl p-4">
                <h3 class="font-bold mb-4 text-indigo-400">طلب سحب</h3>
                <div class="space-y-3">
                    <input type="text" id="wallet-addr" placeholder="عنوان محفظة USDT (TRC20)" class="w-full bg-slate-700 border-none rounded-lg p-3 text-white text-right">
                    <button onclick="saveWallet()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">حفظ العنوان</button>
                </div>
            </div>
        </div>

        <div id="refer-page" class="page-section text-center">
            <i class="fas fa-users text-6xl text-indigo-500 my-6"></i>
            <h2 class="text-2xl font-bold text-white mb-2">دعوة الأصدقاء</h2>
            <p class="text-slate-400 mb-6 px-4">اربح <span class="text-yellow-400">0.01 USDT</span> عن كل شخص يسجل من خلالك.</p>
            <div class="bg-slate-800 p-4 rounded-xl mx-4 border border-dashed border-slate-600">
                <p class="text-xs text-slate-400 mb-2">رابط الإحالة الخاص بك</p>
                <div class="flex justify-between items-center bg-slate-900 rounded-lg p-3">
                    <span id="ref-link" class="text-sm text-indigo-300 truncate">t.me/your_bot?start=id</span>
                    <button onclick="copyRef()" class="text-indigo-400 mr-2"><i class="fas fa-copy"></i></button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-2 pb-6 z-30">
        <button onclick="showPage('home-page', this)" class="nav-item active flex flex-col items-center w-1/3">
            <i class="fas fa-home text-xl mb-1"></i><span class="text-[10px]">الرئيسية</span>
        </button>
        <button onclick="showPage('wallet-page', this)" class="nav-item flex flex-col items-center w-1/3">
            <i class="fas fa-wallet text-xl mb-1"></i><span class="text-[10px]">المحفظة</span>
        </button>
        <button onclick="showPage('refer-page', this)" class="nav-item flex flex-col items-center w-1/3">
            <i class="fas fa-share-alt text-xl mb-1"></i><span class="text-[10px]">الإحالة</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const API_URL = "https://botserv.onrender.com"; // رابط سيرفرك
        const userId = tg.initDataUnsafe?.user?.id || "123456789";
        let adCount = 0;

        // جلب البيانات عند التشغيل
        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/get-user-data?user_id=${userId}`);
                const data = await res.json();
                document.getElementById('balance').innerText = data.balance.toFixed(3);
                document.getElementById('wallet-balance-display').innerText = data.balance.toFixed(3);
                document.getElementById('total-tasks').innerText = data.tasks_total;
                document.getElementById('total-refs').innerText = data.refs_count;
                document.getElementById('wallet-addr').value = data.wallet_address || "";
                document.getElementById('ref-link').innerText = `https://t.me/ADCash00bot?start=${userId}`;
            } catch (e) { console.error("Load error"); }
        }

        function showPage(pageId, btn) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }

        // نظام الإعلانات
        function startAdCycle() {
            if (typeof show_8928374 === 'function') {
                show_8928374().then(() => {
                    adCount++;
                    if (adCount >= 3) {
                        completeTask();
                        adCount = 0;
                    } else {
                        tg.showAlert(`شاهدت ${adCount} من أصل 3 إعلانات.`);
                    }
                });
            } else {
                tg.showAlert("جاري تحميل الإعلانات... حاول مرة أخرى");
            }
        }

        async function completeTask() {
            await fetch(`${API_URL}/add-reward`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId })
            });
            tg.showConfirm("✅ مبروك! حصلت على 0.005 USDT");
            loadData();
        }

        async function saveWallet() {
            const addr = document.getElementById('wallet-addr').value;
            await fetch(`${API_URL}/save-wallet`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, address: addr })
            });
            tg.showAlert("✅ تم حفظ عنوان المحفظة");
        }

        function copyRef() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("📋 تم نسخ الرابط");
        }

        loadData();
    </script>
    <script src='//prorevenue.com/pfe/current/tag.min.js?z=8928374' data-cfasync='false' async></script>
</body>
</html>
